<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jann el quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="watermark"></div>

  <div class="app" id="app">

    <!-- Pantalla 1: Bienvenida -->
    <div class="screen active" id="screen-welcome">
      <div class="content">
        <p class="text-big">hola jann, soy aka, gracias por confiar en mí y no creer que voy a robar cuentas de niños indefensos...</p>
        <button class="btn" data-action="go-robbery">continuar</button>
      </div>
    </div>

    <!-- Pantalla 2: Robo -->
    <div class="screen" id="screen-robbery">
      <div class="content">
        <p class="text-big">ahora te voy a robar tus cuentas bancarias</p>
        <div class="btn-group">
          <div class="btn-wrapper" id="wrapper-dejarse">
            <button class="btn btn-secondary" data-action="show-arrow">dejarse robar</button>
          </div>
          <div class="btn-wrapper" id="wrapper-robar">
            <button class="btn btn-primary" data-action="go-quiz-intro">no dejarse robar y a cambio, robarle todo el oro de latam</button>
          </div>
        </div>
        <div class="arrow-hint" id="arrow-hint">
          <div class="arrow">&#8594;</div>
          <p class="text-big">Clickeá acá, no seas boba</p>
        </div>
      </div>
    </div>

    <!-- Pantalla 3: Intro Quiz -->
    <div class="screen" id="screen-quiz-intro">
      <div class="content">
        <p class="text-big">bueno, ahora si, 10 preguntas, sobre tu lugar de origen, que tan inteligente es jann?</p>
        <button class="btn" data-action="start-quiz">empezar</button>
      </div>
    </div>

    <!-- Pantalla 4: Quiz -->
    <div class="screen" id="screen-quiz">
      <div class="content">
        <div class="quiz-header">
          <span class="quiz-progress" id="quiz-progress">1/10</span>
        </div>
        <p class="text-big" id="question-text"></p>
        <div class="options" id="options-container"></div>
      </div>
    </div>

    <!-- Pantalla 5: Resultado -->
    <div class="screen" id="screen-result">
      <div class="content">
        <p class="text-big" id="result-text"></p>
        <button class="btn" data-action="show-final">ver resultado</button>
      </div>
    </div>

    <!-- Pantalla 6: Mensaje final -->
    <div class="screen" id="screen-final">
      <div class="content">
        <p class="text-big" id="final-message"></p>
        <button class="btn" data-action="restart">volver a intentar</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
